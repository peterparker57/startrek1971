<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="STTR1">
  <title>STAR TREK 1971</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon-192.png" sizes="192x192" type="image/png">
  <link rel="icon" href="icon-512.png" sizes="512x512" type="image/png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="terminal">
    <pre id="output" aria-live="polite"></pre>
    <form id="prompt" autocomplete="off">
      <span id="cursor">&gt;</span>
      <input id="cmd" type="text" inputmode="text" autocapitalize="characters" spellcheck="false" autocomplete="off" disabled>
    </form>
  </main>
  <script type="module" src="main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch((err) => {
          console.warn('Service worker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
